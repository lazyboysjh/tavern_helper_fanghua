<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>大魏芳华 · 状态栏预览</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #121214;
      color: #ececed;
      display: flex;
      flex-direction: column;
    }
    .preview-bar {
      flex-shrink: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(22,22,26,.95);
      z-index: 10;
    }
    .preview-bar h1 {
      margin: 0 12px 0 0;
      font-size: 14px;
      font-weight: 700;
      color: #b89465;
    }
    .preview-bar p {
      margin: 0;
      font-size: 12px;
      color: #a1a1aa;
      flex: 1 1 220px;
    }
    .preview-bar button {
      border: 1px solid rgba(184,148,101,.35);
      background: rgba(184,148,101,.12);
      color: #f0e6d8;
      border-radius: 8px;
      padding: 6px 11px;
      font-size: 12px;
      cursor: pointer;
    }
    .preview-bar button.on {
      background: #b89465;
      color: #1a1410;
      border-color: #b89465;
    }
    .preview-bar button.tab-btn {
      border-color: rgba(106,140,175,.4);
      background: rgba(106,140,175,.12);
    }
    .preview-bar button.tab-btn.on {
      background: #6a8caf;
      color: #0f1418;
    }
    #frame {
      flex: 1;
      width: 100%;
      border: 0;
      min-height: 0;
      background: #0f0f11;
    }
  </style>
</head>
<body>

    <p>下方状态栏内 <b>粉黛/天机/风闻/历事</b> 可点。默认打开风闻看机宜。</p>
    <button type="button" class="scene on" data-scene="luoyang">洛阳·剑舞 24</button>
    <button type="button" class="scene" data-scene="huainan">淮南·施水 40</button>
    <button type="button" class="scene" data-scene="pingyuan">平原·守孝 1</button>
    <button type="button" class="tab-btn" data-tab="tianji">天机</button>
    <button type="button" class="tab-btn on" data-tab="fengxin">风闻</button>
    <button type="button" class="tab-btn" data-tab="lishi">历事</button>
    <button type="button" class="tab-btn" data-tab="fende">粉黛</button>

    var currentScene = 'luoyang';
    var currentTab = 'fengxin';
    var frame = document.getElementById('frame');

    function buildStat(sceneKey) {
      var scene = SCENES[sceneKey] || SCENES.luoyang;
      var stat = JSON.parse(JSON.stringify(BASE));
      Object.keys(scene).forEach(function (k) {
        if (k === '风闻录' && scene[k]) {
          stat[k] = Object.assign({}, stat[k] || {}, scene[k]);
        } else {
          stat[k] = scene[k];
        }
      });
      return stat;
    }

    function persistAndReload() {
      sessionStorage.setItem(PREVIEW_KEY, JSON.stringify(buildStat(currentScene)));
      sessionStorage.setItem(TAB_KEY, currentTab);
      sessionStorage.setItem('__dwf_preview_user_name__', '仲明');
      frame.src = 'index.html?dwf_preview=1&_=' + Date.now();
    }

    sessionStorage.setItem(PREVIEW_KEY, JSON.stringify(buildStat(currentScene)));
    sessionStorage.setItem(TAB_KEY, currentTab);
    sessionStorage.setItem('__dwf_preview_user_name__', '仲明');

    document.querySelectorAll('.scene').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.scene').forEach(function (b) { b.classList.remove('on'); });
        btn.classList.add('on');
        currentScene = btn.getAttribute('data-scene');
        persistAndReload();
      });
    });

    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('on'); });
        btn.classList.add('on');
        currentTab = btn.getAttribute('data-tab');
        persistAndReload();
      });
    });

</html>
