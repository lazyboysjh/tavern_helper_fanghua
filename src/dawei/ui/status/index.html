/* 天可汗状态栏 · 主栏目（六轨） */
.dwf-main-nav{

  gap:6px;
  margin:0 0 14px;
  padding:6px;
  border-radius:16px;
  background:linear-gradient(145deg,rgba(255,255,255,.05),rgba(0,0,0,.22));

.dwf-main-tab{

  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;min-height:52px;padding:8px 6px;
  border-radius:12px;border:1px solid transparent;
  background:transparent;color:var(--dim);

  font-size:.68rem;font-weight:700;letter-spacing:.12em;
}

.dwf-main-tab:hover{color:var(--txt2);background:rgba(255,255,255,.04)}
.dwf-main-tab.on{
  color:#fff;
  border-color:color-mix(in srgb,var(--tab-accent,var(--c)) 48%,rgba(255,255,255,.1));
  background:linear-gradient(165deg,color-mix(in srgb,var(--tab-accent,var(--c)) 22%,rgba(40,35,30,.9)),rgba(16,14,12,.95));
  box-shadow:0 12px 28px rgba(0,0,0,.28),0 0 0 1px color-mix(in srgb,var(--tab-accent,var(--c)) 22%,transparent),inset 0 1px 0 rgba(255,255,255,.08);
}
.dwf-main-tab.on i{opacity:1;transform:translateY(-1px);color:var(--tab-accent,var(--c));filter:drop-shadow(0 0 6px color-mix(in srgb,var(--tab-accent,var(--c)) 50%,transparent))}

  border-radius:999px;background:linear-gradient(135deg,#e85d6a,#c26a3a);
  color:#fff;font-size:.52rem;font-weight:800;line-height:16px;text-align:center;
}
.dwf-panel{display:none;animation:dwfPanelIn .34s cubic-bezier(.22,1,.36,1)}
.dwf-panel.on{display:block}

  position:relative;
  min-height:clamp(240px,36vh,380px);
}

  scrollbar-color:rgba(255,255,255,.22) transparent;
}

.dwf-section .dwf-kv-v,.dwf-urgent-reason,.dwf-timeline-text,.dwf-rank-sub,.dwf-rumor-item{word-break:break-word}

.dwf-event-tag{
  padding:5px 10px;border-radius:10px;font-size:.72rem;font-weight:600;
  background:linear-gradient(135deg,rgba(184,148,101,.18),rgba(0,0,0,.2));
  border:1px solid color-mix(in srgb,var(--c) 30%,transparent);color:var(--txt);
}

/* 风信 */
.dwf-urgent-card{
  position:relative;padding:14px 14px 14px 18px;border-radius:16px;margin-bottom:10px;
  background:linear-gradient(155deg,rgba(28,22,20,.88),rgba(12,10,14,.92));
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 12px 30px rgba(0,0,0,.24);
  overflow:hidden;
}
.dwf-urgent-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--urgent-accent,#e85d6a),transparent);
}
.dwf-urgent-title{font-size:.88rem;font-weight:800;color:#fff;letter-spacing:.04em;margin-bottom:6px}
.dwf-urgent-reason{font-size:.76rem;color:var(--txt2);line-height:1.5;margin-bottom:10px}
.dwf-urgent-foot{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.dwf-urgent-pill{
  display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;
  font-size:.64rem;font-weight:700;background:rgba(255,255,255,.06);color:var(--dim);
}
.dwf-urgent-pill.hot{color:#ffc9cf;background:rgba(232,93,106,.15);border:1px solid rgba(232,93,106,.25)}
.dwf-rumor-list{display:grid;gap:10px}
.dwf-rumor-item{
  padding:12px 14px;border-radius:14px;
  background:linear-gradient(155deg,rgba(20,18,16,.85),rgba(8,8,10,.9));
  border:1px solid rgba(255,255,255,.06);
  border-left:3px solid color-mix(in srgb,var(--c) 55%,transparent);
  box-shadow:0 8px 22px rgba(0,0,0,.18);
}
.dwf-rumor-key{font-size:.64rem;font-weight:800;color:var(--c);letter-spacing:.08em;margin-bottom:4px}

/* 历事 */
.dwf-timeline{position:relative;padding:4px 0 4px 8px}
.dwf-timeline::before{
  content:"";position:absolute;left:14px;top:12px;bottom:12px;width:2px;
  background:linear-gradient(180deg,var(--c),rgba(255,255,255,.04));
}
.dwf-timeline-item{position:relative;padding:0 0 12px 36px;margin-bottom:4px}
.dwf-timeline-item::before{
  content:"";position:absolute;left:9px;top:14px;width:12px;height:12px;border-radius:50%;
  background:var(--c);box-shadow:0 0 14px color-mix(in srgb,var(--c) 55%,transparent);
  border:2px solid rgba(0,0,0,.45);
}
.dwf-timeline-item.dwf-glass-card{padding:12px 14px 12px 36px;border-radius:14px;margin-left:4px}
.dwf-timeline-text{font-size:.8rem;line-height:1.55;color:var(--txt2)}
.dwf-empty{
  padding:28px 16px;text-align:center;border-radius:16px;
  border:1px dashed rgba(255,255,255,.1);color:var(--dim);font-size:.78rem;letter-spacing:.08em;
}

/* 粉黛增强 — 背面顶部标签已移除，关系/心情见属性行 */

/* 房名次 */
.dwf-rank-grid{display:grid;gap:10px}
.dwf-rank-card{
  display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  padding:14px 16px;border-radius:16px;
  background:linear-gradient(155deg,rgba(28,24,22,.9),rgba(12,10,14,.94));
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 10px 26px rgba(0,0,0,.22);
}
.dwf-rank-seal{
  width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  font-size:1.1rem;font-weight:800;color:#fff;
  background:linear-gradient(145deg,color-mix(in srgb,var(--rank-accent,#b89465) 70%,#fff 10%),color-mix(in srgb,var(--rank-accent,#b89465) 40%,#000 20%));
  box-shadow:0 8px 20px color-mix(in srgb,var(--rank-accent,#b89465) 28%,transparent);
}
.dwf-rank-name{font-size:.92rem;font-weight:800;color:#fff;letter-spacing:.06em}
.dwf-rank-sub{font-size:.7rem;color:var(--dim);margin-top:3px}
.dwf-rank-badge{
  padding:5px 11px;border-radius:999px;font-size:.68rem;font-weight:800;letter-spacing:.1em;
  color:#fff;border:1px solid color-mix(in srgb,var(--rank-accent,#b89465) 45%,transparent);
  background:color-mix(in srgb,var(--rank-accent,#b89465) 22%,rgba(0,0,0,.2));
}

/* 子嗣 */
.dwf-child-grid{display:grid;gap:10px}
.dwf-child-card{
  padding:14px 16px;border-radius:16px;
  background:var(--card-bg);border:1px solid var(--card-border);box-shadow:var(--card-shadow);
  position:relative;overflow:hidden;
}
.dwf-child-card::before{
  content:"";position:absolute;top:0;left:0;width:4px;height:100%;
  background:linear-gradient(180deg,var(--child-accent,#6a8caf),transparent);
}
.dwf-child-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.dwf-child-name{font-size:.94rem;font-weight:800;color:#fff;letter-spacing:.05em}
.dwf-child-gender{
  padding:3px 9px;border-radius:999px;font-size:.64rem;font-weight:800;
  background:rgba(255,255,255,.06);color:var(--txt2);
}
.dwf-child-gender.male{color:#9ec5e8;border:1px solid rgba(110,168,220,.25)}
.dwf-child-gender.female{color:#ffc9cf;border:1px solid rgba(232,93,106,.22)}
.dwf-child-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.dwf-child-pill{
  font-size:.68rem;padding:3px 9px;border-radius:999px;
  background:rgba(255,255,255,.05);color:var(--dim);
}
.dwf-rumu-row{display:grid;gap:5px}
.dwf-rumu-label{display:flex;justify-content:space-between;font-size:.64rem;color:var(--dim)}
.dwf-rumu-track{height:5px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
.dwf-rumu-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,#6a8caf,#b89465,#e8c49a);transition:width .5s ease}

/* 路线横幅 · 终局卡 · 机宜高级卡片 */
.dwf-route-banner{
  margin-bottom:12px;padding:14px 16px;border-radius:16px;
  background:linear-gradient(145deg,rgba(28,24,22,.92),rgba(12,10,14,.96));
  border:1px solid color-mix(in srgb,var(--route-accent,#b89465) 32%,rgba(255,255,255,.06));
  box-shadow:0 10px 28px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.05);
}
.dwf-route-banner.dwf-route-ended{
  border-color:color-mix(in srgb,var(--route-accent,#b89465) 45%,rgba(255,255,255,.08));
  background:linear-gradient(155deg,color-mix(in srgb,var(--route-accent,#b89465) 12%,rgba(28,24,22,.95)),rgba(10,8,12,.98));
}
.dwf-route-banner-k{font-size:.66rem;font-weight:800;letter-spacing:.16em;color:var(--dim);margin-bottom:6px}
.dwf-route-banner-k i{color:var(--route-accent,#b89465);margin-right:4px}
.dwf-route-banner-v{font-size:1rem;font-weight:800;color:#fff;letter-spacing:.06em}
.dwf-route-banner-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.dwf-route-pill{
  display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:999px;
  font-size:.72rem;font-weight:700;color:#fff;
  background:color-mix(in srgb,var(--route-accent,#b89465) 28%,rgba(0,0,0,.25));
  border:1px solid color-mix(in srgb,var(--route-accent,#b89465) 42%,transparent);
}
.dwf-route-pill.soft{color:var(--txt2);background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08)}
.dwf-route-banner-sub,.dwf-route-banner-paras{margin-top:8px;font-size:.76rem;line-height:1.55;color:var(--txt2)}
.dwf-route-banner-paras p{margin:0 0 6px}
.dwf-route-banner-paras p:last-child{margin-bottom:0}
.dwf-ending-card{
  position:relative;padding:28px 22px 22px;border-radius:22px;margin-bottom:14px;overflow:hidden;text-align:center;
  background:radial-gradient(ellipse 90% 70% at 50% 0%,color-mix(in srgb,var(--ending-accent,#b89465) 18%,transparent),transparent 58%),linear-gradient(165deg,rgba(22,18,16,.96),rgba(8,6,10,.98));
  border:1px solid color-mix(in srgb,var(--ending-accent,#b89465) 38%,rgba(255,255,255,.06));
  box-shadow:0 18px 48px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06);
}
.dwf-ending-glow{position:absolute;inset:-40% -20% auto;height:70%;background:radial-gradient(circle at 50% 100%,color-mix(in srgb,var(--ending-accent,#b89465) 22%,transparent),transparent 68%);pointer-events:none}
.dwf-ending-seal{width:52px;height:52px;margin:0 auto 14px;border-radius:50%;display:grid;place-items:center;font-size:1.2rem;color:#fff;background:linear-gradient(145deg,color-mix(in srgb,var(--ending-accent,#b89465) 55%,#fff 8%),color-mix(in srgb,var(--ending-accent,#b89465) 25%,#000 15%));box-shadow:0 10px 28px color-mix(in srgb,var(--ending-accent,#b89465) 35%,transparent)}
.dwf-ending-title{font-size:1.35rem;font-weight:800;color:#fff;letter-spacing:.12em;margin-bottom:6px}
.dwf-ending-lead{font-size:.72rem;color:var(--dim);letter-spacing:.14em;margin-bottom:14px}
.dwf-ending-paras{text-align:left;font-size:.82rem;line-height:1.65;color:var(--txt2)}
.dwf-ending-paras p{margin:0 0 10px}
.dwf-ending-paras p:last-child{margin-bottom:0}
.dwf-ending-foot{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06);font-size:.66rem;color:var(--dim);letter-spacing:.08em}
.dwf-fengxin-ended .dwf-ending-card{margin-bottom:0}
.dwf-jiyi-stack{display:grid;gap:14px;margin-bottom:12px}
.dwf-jiyi-card{
  position:relative;padding:0;border-radius:20px;overflow:hidden;
  background:linear-gradient(158deg,rgba(26,20,18,.96),rgba(10,8,12,.98));
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 16px 40px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,255,255,.05);
}
.dwf-jiyi-card::before{content:none}
.dwf-jiyi-main{
  position:relative;padding:14px 16px 16px;
  border-left:3px solid var(--jiyi-accent,#e85d6a);
}
.dwf-jiyi-glow{position:absolute;top:-20%;right:-8%;width:50%;height:70%;pointer-events:none;background:radial-gradient(circle,color-mix(in srgb,var(--jiyi-accent,#e85d6a) 10%,transparent),transparent 72%)}
.dwf-jiyi-card.is-jindu{border-color:color-mix(in srgb,var(--jiyi-accent,#e85d6a) 26%,rgba(255,255,255,.08))}
.dwf-jiyi-card.is-zhicha .dwf-jiyi-main{border-left-color:color-mix(in srgb,var(--jiyi-accent,#e85d6a) 70%,#8b9aab)}

/* 机宜卡片 · 截止行程倒计时（仅风闻机宜卡，非世界天时） */
.dwf-jiyi-countdown{
  display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  padding:12px 14px;
  background:linear-gradient(90deg,color-mix(in srgb,var(--jiyi-accent,#e85d6a) 14%,rgba(0,0,0,.35)),rgba(0,0,0,.22));
  border-bottom:1px solid rgba(255,255,255,.06);
}
.dwf-jiyi-countdown--critical{background:linear-gradient(90deg,rgba(232,93,106,.22),rgba(0,0,0,.28))}
.dwf-jiyi-countdown--warning{background:linear-gradient(90deg,rgba(201,162,39,.16),rgba(0,0,0,.24))}
.dwf-jiyi-countdown-ring{position:relative;width:56px;height:56px;flex-shrink:0}
.dwf-jiyi-countdown-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.dwf-cd-track{fill:none;stroke:rgba(255,255,255,.1);stroke-width:4}
.dwf-cd-fill{
  fill:none;stroke:var(--jiyi-accent,#e85d6a);stroke-width:4;stroke-linecap:round;
  transition:stroke-dashoffset .55s cubic-bezier(.22,1,.36,1);
}
.dwf-jiyi-countdown--critical .dwf-cd-fill{stroke:#e85d6a;filter:drop-shadow(0 0 6px rgba(232,93,106,.55))}
.dwf-jiyi-countdown--warning .dwf-cd-fill{stroke:#d97a56}
.dwf-cd-core{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;line-height:1;
}
.dwf-cd-num{font-size:1.15rem;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
.dwf-cd-unit{font-size:.5rem;color:var(--dim);letter-spacing:.12em;margin-top:1px}
.dwf-jiyi-countdown-label{font-size:.68rem;font-weight:800;color:#fff;letter-spacing:.08em}
.dwf-jiyi-countdown-label i{color:var(--jiyi-accent,#e85d6a);margin-right:4px;font-size:.62rem}
.dwf-jiyi-countdown-sub{font-size:.62rem;color:var(--dim);margin-top:3px;line-height:1.45}
.dwf-jiyi-countdown-sub b{color:var(--txt2);font-weight:700}
.dwf-jiyi-countdown-track{height:4px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:8px}
.dwf-jiyi-countdown-track span{
  display:block;height:100%;border-radius:inherit;
  background:linear-gradient(90deg,var(--jiyi-accent,#e85d6a),color-mix(in srgb,var(--jiyi-accent,#e85d6a) 50%,#fff));
  transition:width .5s ease;
}
.dwf-jiyi-countdown-fire{
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:44px;
  padding:6px 8px;border-radius:12px;
  background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.08);
}
.dwf-jiyi-countdown-fire span{font-size:.56rem;font-weight:800;color:var(--dim);letter-spacing:.1em}
.dwf-jiyi-countdown-fire em{font-style:normal;font-size:1rem;font-weight:800;color:var(--jiyi-accent,#e85d6a);line-height:1.1}
.dwf-jiyi-countdown--critical .dwf-jiyi-countdown-fire{border-color:rgba(232,93,106,.35);animation:dwfPulse 2s ease-in-out infinite}
@keyframes dwfPulse{0%,100%{box-shadow:0 0 0 0 rgba(232,93,106,0)}50%{box-shadow:0 0 12px rgba(232,93,106,.25)}}

/* RPG 标签带 */
.dwf-jiyi-tags{
  display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  padding:0 0 10px;margin-top:-2px;
}
.dwf-jiyi-tag{
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 9px;border-radius:999px;
  font-size:.58rem;font-weight:800;letter-spacing:.06em;line-height:1.3;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);color:var(--txt2);
  max-width:100%;word-break:break-word;
}
.dwf-jiyi-tag.is-hot{box-shadow:0 0 10px color-mix(in srgb,var(--c) 35%,transparent)}
.dwf-jiyi-tag--route{
  color:#fff;
  border-color:color-mix(in srgb,var(--tag-accent,#b89465) 45%,transparent);
  background:color-mix(in srgb,var(--tag-accent,#b89465) 20%,rgba(0,0,0,.2));
}
.dwf-jiyi-tag--ending{
  color:#f0d0b0;
  border-color:rgba(184,148,101,.45);
  background:linear-gradient(135deg,rgba(184,148,101,.18),rgba(0,0,0,.25));
}
.dwf-jiyi-tag--ending.is-hot,.dwf-jiyi-tag--ending:hover{
  border-color:rgba(240,208,176,.55);
  box-shadow:0 0 12px rgba(184,148,101,.22);
}
.dwf-jiyi-tag--block{
  color:#ffc9cf;
  border-color:rgba(232,93,106,.28);
  background:rgba(232,93,106,.1);
  opacity:.88;
}
.dwf-jiyi-tag--meet{
  color:#ffc9cf;
  border-color:rgba(232,93,106,.35);
  background:linear-gradient(135deg,rgba(232,93,106,.16),rgba(0,0,0,.2));
}
.dwf-jiyi-tag--meet::before{
  content:"";width:5px;height:5px;border-radius:50%;
  background:#e85d6a;box-shadow:0 0 6px rgba(232,93,106,.6);
}
.dwf-jiyi-tag--fate{
  color:var(--dim);
  border-style:dashed;
  border-color:rgba(255,255,255,.12);
}
.dwf-jiyi-tag--milestone{
  color:var(--c);
  border-color:color-mix(in srgb,var(--c) 35%,transparent);
  background:color-mix(in srgb,var(--c) 10%,transparent);
}
.dwf-jiyi-tag--mutex{
  color:#9ec5e8;
  border-color:rgba(110,168,220,.3);
  background:rgba(106,140,175,.12);
}

.dwf-jiyi-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.dwf-jiyi-head-left{min-width:0;flex:1}
.dwf-jiyi-bucket{display:inline-block;padding:2px 8px;border-radius:999px;margin-bottom:6px;font-size:.58rem;font-weight:800;letter-spacing:.14em;color:var(--jiyi-accent,#e85d6a);background:color-mix(in srgb,var(--jiyi-accent,#e85d6a) 14%,transparent);border:1px solid color-mix(in srgb,var(--jiyi-accent,#e85d6a) 28%,transparent)}
.dwf-jiyi-name{margin:0;font-size:.98rem;font-weight:800;color:#fff;letter-spacing:.06em;line-height:1.35;word-break:break-word}
.dwf-jiyi-urgency{flex-shrink:0;width:56px;text-align:right}
.dwf-jiyi-urgency-lab{display:block;font-size:.56rem;font-weight:800;color:var(--dim);letter-spacing:.1em;margin-bottom:4px}
.dwf-jiyi-urgency-bar{height:4px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden}
.dwf-jiyi-urgency-bar span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--jiyi-accent,#e85d6a),color-mix(in srgb,var(--jiyi-accent,#e85d6a) 60%,#fff))}
.dwf-jiyi-lead{font-size:.66rem;font-weight:700;color:var(--dim);letter-spacing:.06em;margin-bottom:6px;word-break:break-word}
.dwf-jiyi-body{font-size:.78rem;line-height:1.62;color:var(--txt2)}
.dwf-jiyi-body p{margin:0 0 8px}
.dwf-jiyi-body p:last-child{margin-bottom:0}
.dwf-jiyi-foot{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;padding-top:10px;border-top:1px dashed rgba(255,255,255,.07)}
.dwf-jiyi-meta-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:.64rem;font-weight:600;color:var(--txt2);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);max-width:100%;word-break:break-word}
.dwf-jiyi-meta-chip i{font-size:.58rem;color:var(--c);opacity:.85}
.dwf-task-current{border-color:color-mix(in srgb,var(--jiyi-accent,#e85d6a) 30%,rgba(255,255,255,.06))}
.dwf-task-card{margin:0}
.dwf-task-state{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:.62rem;font-weight:800;letter-spacing:.08em;color:var(--txt2);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
.dwf-task-state.is-ready{color:#fff;background:rgba(106,154,106,.18);border-color:rgba(106,154,106,.34)}
.dwf-task-state.is-failed{color:#d8d8d8;background:rgba(139,154,171,.14);border-color:rgba(139,154,171,.3)}
.dwf-task-goals{display:grid;gap:8px;margin-top:12px}
.dwf-task-goal{display:grid;grid-template-columns:auto minmax(0,1fr);gap:8px;align-items:start;padding:8px 10px;border-radius:12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06);font-size:.74rem;line-height:1.45;color:var(--txt2)}
.dwf-task-goal.is-done{color:#e6f3e1;border-color:rgba(106,154,106,.25);background:rgba(106,154,106,.1)}
.dwf-task-check{display:grid;place-items:center;width:18px;height:18px;border-radius:999px;color:var(--jiyi-accent,#e85d6a);font-size:.58rem}
.dwf-task-goal.is-done .dwf-task-check{color:#9bd08c}
.dwf-task-goal-text{word-break:break-word}
.dwf-task-actions{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px;margin-top:12px}
.dwf-task-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:34px;padding:7px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.035));color:var(--txt2);font-size:.7rem;font-weight:800;letter-spacing:.06em;cursor:pointer;transition:transform .22s ease,border-color .22s ease,background .22s ease,opacity .22s ease}
.dwf-task-btn:hover:not(:disabled){transform:translateY(-1px);border-color:color-mix(in srgb,var(--jiyi-accent,#e85d6a) 42%,rgba(255,255,255,.1));color:#fff}
.dwf-task-btn:disabled{opacity:.45;cursor:default}
.dwf-task-btn.primary{color:#fff;background:linear-gradient(135deg,rgba(106,154,106,.32),rgba(0,0,0,.18));border-color:rgba(106,154,106,.36)}
.dwf-task-btn.danger{color:#ffd9d9;background:linear-gradient(135deg,rgba(232,93,106,.22),rgba(0,0,0,.2));border-color:rgba(232,93,106,.32)}

.dwf-section-rumor{margin-top:12px}

  function listJiyiEntries(stat) {

    var cacheKey =

    var zhicha = pools['支汊'] || {};

    Object.keys(zhicha).forEach(function (k) {

    rows.sort(function (a, b) {
      var fa = Number(a.item['火急']) || 0;
      var fb = Number(b.item['火急']) || 0;
      if (fb !== fa) return fb - fa;

  function countdownState(remain) {
    if (remain == null) return 'open';
    if (remain <= 1) return 'critical';
    if (remain <= 4) return 'warning';
    return 'safe';
  }

  /** 机宜卡片：remain = 截止行程 − 当前行程，每推进 1 步减 1，至 0 后过期消失 */
  function renderJiyiDeadlineBar(item, yueke, accent, level) {
    var deadline = Number(item['截止行程']) || 0;
    var openTrip = Number(item['开启行程']) || Math.max(1, yueke);
    if (!deadline) return '';
    var remain = Math.max(0, deadline - yueke);
    var windowTotal = Math.max(1, deadline - openTrip + 1);
    var pct = Math.max(0.06, Math.min(1, remain / windowTotal));
    var state = countdownState(remain);
    var remainText = formatJiyiRemainText(remain);
    var r = 24;
    var c = 2 * Math.PI * r;
    var off = c * (1 - pct);
    return (
      '<div class="dwf-jiyi-countdown dwf-jiyi-countdown--' +
      state +
      '" data-dwf-jiyi-deadline="1" style="--jiyi-accent:' +
      accent +
      '">' +
      '<div class="dwf-jiyi-countdown-ring" aria-label="' +
      esc(remainText) +
      '">' +
      '<svg viewBox="0 0 56 56" aria-hidden="true">' +
      '<circle class="dwf-cd-track" cx="28" cy="28" r="' +
      r +
      '"/>' +
      '<circle class="dwf-cd-fill" cx="28" cy="28" r="' +
      r +
      '" stroke-dasharray="' +
      c +
      '" stroke-dashoffset="' +
      off +
      '"/></svg>' +
      '<div class="dwf-cd-core"><span class="dwf-cd-num">' +
      remain +
      '</span><span class="dwf-cd-unit">步</span></div></div>' +
      '<div class="dwf-jiyi-countdown-info">' +
      '<div class="dwf-jiyi-countdown-label"><i class="fa-regular fa-hourglass-half"></i> ' +
      esc(remainText) +
      '</div>' +
      '<div class="dwf-jiyi-countdown-track"><span style="width:' +
      Math.round(pct * 100) +
      '%"></span></div></div>' +
      '<div class="dwf-jiyi-countdown-fire" title="' +
      esc(urgencyLabel(level)) +
      '"><span>' +
      esc(urgencyLabel(level)) +
      '</span></div></div>'
    );
  }

  function renderTaskDeadlineBar(task, yueke, accent, level, failed) {
    var deadline = Number(task['截止行程']) || 0;
    if (!deadline) return '';
    var startTrip = Number(task['开始行程']) || Math.max(1, yueke);
    var remain = deadline - yueke;
    var displayRemain = Math.max(0, remain);
    var windowTotal = Math.max(1, deadline - startTrip + 1);
    var pct = Math.max(0.06, Math.min(1, displayRemain / windowTotal));
    var state = failed || remain < 0 ? 'critical' : countdownState(displayRemain);
    var label = failed || remain < 0 ? '已超过截止' : formatJiyiRemainText(displayRemain);
    var r = 24;
    var c = 2 * Math.PI * r;
    var off = c * (1 - pct);
    return (
      '<div class="dwf-jiyi-countdown dwf-jiyi-countdown--' +
      state +
      '" data-dwf-task-deadline="1" style="--jiyi-accent:' +
      accent +
      '">' +
      '<div class="dwf-jiyi-countdown-ring" aria-label="' +
      esc(label) +
      '">' +
      '<svg viewBox="0 0 56 56" aria-hidden="true">' +
      '<circle class="dwf-cd-track" cx="28" cy="28" r="' +
      r +
      '"/>' +
      '<circle class="dwf-cd-fill" cx="28" cy="28" r="' +
      r +
      '" stroke-dasharray="' +
      c +
      '" stroke-dashoffset="' +
      off +
      '"/></svg>' +
      '<div class="dwf-cd-core"><span class="dwf-cd-num">' +
      displayRemain +
      '</span><span class="dwf-cd-unit">步</span></div></div>' +
      '<div class="dwf-jiyi-countdown-info">' +
      '<div class="dwf-jiyi-countdown-label"><i class="fa-regular fa-hourglass-half"></i> ' +
      esc(label) +
      '</div>' +
      '<div class="dwf-jiyi-countdown-sub">任务截止：第 <b>' +
      esc(String(deadline)) +
      '</b> 步</div>' +
      '<div class="dwf-jiyi-countdown-track"><span style="width:' +
      Math.round(pct * 100) +
      '%"></span></div></div>' +
      '<div class="dwf-jiyi-countdown-fire" title="' +
      esc(urgencyLabel(level)) +
      '"><span>' +
      esc(urgencyLabel(level)) +
      '</span></div></div>'
    );
  }

  function parseRelatedNames(raw) {
    return String(raw || '')
      .split(/[、,，]/)
      .map(function (s) {
        return s.trim();
      })
      .filter(Boolean);
  }

  function collectJiyiTags(stat, item) {
    var tags = [];
    var seen = {};
    function push(kind, label) {
      var k = kind + ':' + label;
      if (seen[k]) return;
      seen[k] = true;
      tags.push({ kind: kind, label: label });
    }
    (item['卡片标签'] || []).forEach(function (t) {
      if (t && t.label) push(t.kind || 'fate', t.label);
    });
    var book = getPinkBook(stat);
    parseRelatedNames(item['相关人物']).forEach(function (name) {
      if (!book[name]) return;
      if (!isPresent(book[name]['是否登场'])) {
        push('meet', '新逢·' + name);
      }
    });
    var prev = getRoutePreview(stat);
    var lead = ((stat && stat['命途']) || {})['主导'];
    if (lead && prev['倾向']) {
      var hint = String(prev['倾向']);
      tags.forEach(function (t) {
        if (t.kind !== 'ending') return;
        var tail = String(t.label).replace(/^收束·/, '');
        if (tail.indexOf(hint) >= 0 || hint.indexOf(tail) >= 0) t.hot = true;
      });
    }
    return tags;
  }

  function renderJiyiTagRow(stat, item) {
    var tags = collectJiyiTags(stat, item);
    if (!tags.length) return '';
    return (
      '<div class="dwf-jiyi-tags">' +
      tags
        .map(function (t) {
          var cls = 'dwf-jiyi-tag dwf-jiyi-tag--' + esc(t.kind || 'fate');
          if (t.hot) cls += ' is-hot';
          if (t.kind === 'route' && ROUTE_COLORS[t.label]) {
            return (
              '<span class="' +
              cls +
              '" style="--tag-accent:' +
              ROUTE_COLORS[t.label] +
              '">' +
              esc(String(t.label).replace(/^收束·/, '结局·')) +
              '</span>'
            );
          }
          return '<span class="' + cls + '">' + esc(String(t.label).replace(/^收束·/, '结局·')) + '</span>';
        })
        .join('') +
      '</div>'
    );
  }

  function renderJiyiCard(row, yueke, stat) {

  function renderTaskGoals(task) {

  function renderCurrentTaskPanel(stat) {
    var task = getCurrentTask(stat);
    if (!task.id) return '';
    var expired = taskIsExpired(stat);
    var failed = task['状态'] === '已失败' || expired;
    var completable = taskCanComplete(stat);
    var level = Math.max(1, Math.min(5, Number(task['火急']) || 3));
    var accent = failed ? '#8b9aab' : urgencyAccent(level);
    var parsed = parseJiyiReason(task['因由'] || task.id);
    var yueke = Number(_.get(stat, '世界与剧情.行程', 0)) || 0;
    var deadlineHtml = renderTaskDeadlineBar(task, yueke, accent, level, failed);
    return (
      '<div class="dwf-section dwf-task-current" style="--jiyi-accent:' +
      accent +
      '">' +
      '<div class="dwf-section-hd"><span><i class="fa-solid fa-flag-checkered"></i>当前事件</span><span class="dwf-task-state ' +
      (failed ? 'is-failed' : completable ? 'is-ready' : '') +

      '</span></div>' +

        function hashStringToSeed(text) {
            var h = 2166136261;
            text = String(text || '');
            for (var i = 0; i < text.length; i++) {
                h ^= text.charCodeAt(i);
                h = Math.imul(h, 16777619);
            }
            return h >>> 0;
        }

        function seededRandom(seed) {
            var t = seed >>> 0;
            return function() {
                t += 0x6D2B79F5;
                var r = Math.imul(t ^ (t >>> 15), 1 | t);
                r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
                return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
            };
        }

        function getLatestMessageEntropy() {
            try {
                var getChatMessagesApi = getApi('getChatMessages');
                var latest = getChatMessagesApi ? getChatMessagesApi(-1, { include_swipes: true })[0] : null;
                if (!latest) return 'no-message';
                return [latest.message_id, latest.swipe_id, latest.role, String(latest.message || '').length].join(':');
            } catch(e) {
                return 'message-unknown';
            }
        }

        function getCryptoEntropy() {
            try {
                if (window.crypto && crypto.getRandomValues) {
                    var buf = new Uint32Array(2);
                    crypto.getRandomValues(buf);
                    return Array.prototype.join.call(buf, '-');
                }
            } catch(e) {}
            return Math.random().toString(36).slice(2);
        }

        function shuffleCopy(list, salt) {
            var arr = list.slice();
            var seedText = [galleryUid, salt || '', getLatestMessageEntropy(), Date.now(), getCryptoEntropy()].join('|');
            var rand = seededRandom(hashStringToSeed(seedText));
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(rand() * (i + 1));
                var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
            }
            return arr;
        }

        function getStatData() {
            if (window.__DWF_PREVIEW_BOOT__) {
                try {
                    var raw = sessionStorage.getItem('__dwf_preview_stat__');
                    if (raw) {
                        var parsed = JSON.parse(raw);
                        if (parsed && typeof parsed === 'object') return parsed;
                    }
                } catch (e) {}
            }
            if (window.__DWF_PREVIEW_STAT__ && typeof window.__DWF_PREVIEW_STAT__ === 'object') {
                return window.__DWF_PREVIEW_STAT__;
            }
            let stat_data = {};
            try {
                const _getAllVars = typeof getAllVariables === 'function'
                    ? getAllVariables
                    : (window.parent && typeof window.parent.getAllVariables === 'function' ? window.parent.getAllVariables : null);

                if (_getAllVars) {
                    const all_variables = _getAllVars() || {};
                    const raw_stat_data = _.get(all_variables, 'stat_data', {});
                    if (typeof raw_stat_data === 'string') {
                        try { stat_data = JSON.parse(raw_stat_data) || {}; } catch (e) { stat_data = {}; }
                    } else if (raw_stat_data && typeof raw_stat_data === 'object') {
                        stat_data = raw_stat_data;
                    }

                    if (stat_data && (stat_data['群芳录'] || stat_data['世界与剧情'])) {
                        return stat_data;
                    }
                }
            } catch (e) {}
            try {
                var candidateIds = [];
                if (isLatestAssistantMessage()) {
                    var latestId = getLatestAssistantMessageId();
                    if (latestId != null) candidateIds.push(Number(latestId));
                }
                var hostId = getHostingMessageId();
                if (hostId != null && candidateIds.indexOf(Number(hostId)) < 0) candidateIds.push(Number(hostId));
                if (!candidateIds.length && typeof getCurrentMessageId === 'function') {
                    var currentId = getCurrentMessageId();
                    if (currentId != null && currentId !== '') candidateIds.push(Number(currentId));
                }
                for (var ci = 0; ci < candidateIds.length; ci++) {
                    var fromMessage = readStatFromMessage(candidateIds[ci]);
                    if (fromMessage) return fromMessage;
                }
            } catch (e) {}
            return stat_data;
        }

        function compareCharOrder(a, b) {
            var ia = CHAR_ORDER.indexOf(a);
            var ib = CHAR_ORDER.indexOf(b);
            if (ia >= 0 && ib >= 0) return ia - ib;
            if (ia >= 0) return -1;
            if (ib >= 0) return 1;
            return String(a).localeCompare(String(b), 'zh-CN');
        }

        function sortCharNames(names) {
            return names.slice().sort(compareCharOrder);
        }

        function normalizeRoleName(name, stat) {
            name = String(name || '').trim();

            return CHAR_ORDER.indexOf(name) >= 0 ? name : '';
        }

        function normalizeRoleList(raw, stat) {
            var list = [];
            if (Array.isArray(raw)) {
                list = raw;
            } else if (typeof raw === 'string') {
                list = raw.split(/[、,，\s]+/);
            }
            var result = [];
            for (var i = 0; i < list.length; i++) {
                var name = normalizeRoleName(list[i], stat);
                if (name && result.indexOf(name) < 0) result.push(name);
            }
            return sortCharNames(result);
        }

        function getCurrentInteractionRole(stat) {
            return normalizeRoleName(_.get(stat, '世界与剧情.当前互动角色', ''), stat);

        function getPresenceFallbackNames(stat) {
            var names = [];
            var book = getPinkBookFromStat(stat);
            Object.keys(book).forEach(function(name) {
                var cData = book[name];
                if (cData && typeof cData === 'object' && isPresent(cData['是否登场'])) names.push(name);
            });

        }

        function getPresentCharNames(stat) {
            var names = [];
            var book = getPinkBookFromStat(stat);
            var sceneNames = normalizeRoleList(_.get(stat, '世界与剧情.当前场景角色', []), stat);
            var current = getCurrentInteractionRole(stat);

            function add(name) {
                if (!name || names.indexOf(name) >= 0) return;
                if (!(book[name] && typeof book[name] === 'object')) return;
                names.push(name);
            }

            add(current);
            for (var i = 0; i < sceneNames.length; i++) add(sceneNames[i]);

            var fallback = getPresenceFallbackNames(stat);
            for (var j = 0; j < fallback.length; j++) add(fallback[j]);
            return sortCharNames(names);
        }

        function getCharActivitySig(stat, name) {
            var book = (stat && stat['群芳录']) || {};
            var cData = book[name] || {};
            return [
                Number(cData['好感度']) || 0,
                String(cData['心里想法'] || ''),
                String(cData['当前状态'] || ''),
                String(cData['心情'] || ''),
                String(cData['与user关系'] || '')
            ].join('\x1f');
        }

        function pickAutoSceneTab(stat, tabs) {
            if (!tabs || !tabs.length) return '';
            var present = getPresentCharNames(stat);
            var presentKey = present.join('\x1e');
            var prevPresent = __mnxLastPresentSet ? __mnxLastPresentSet.split('\x1e') : [];
            var added = [];
            if (__mnxLastPresentSet) {
                for (var i = 0; i < present.length; i++) {
                    if (prevPresent.indexOf(present[i]) < 0) added.push(present[i]);
                }
            }
            __mnxLastPresentSet = presentKey;

            var tabNames = tabs.map(function(item){ return item.name; });
            var activeValid = activeSceneTab && tabNames.indexOf(activeSceneTab) >= 0;
            var currentRole = getCurrentInteractionRole(stat);
            if (currentRole && tabNames.indexOf(currentRole) >= 0) return currentRole;

            if (__mnxSceneTabInitialized && added.length) {
                var addedSorted = sortCharNames(added);
                return addedSorted[addedSorted.length - 1];
            }

            if (activeSceneTab && present.indexOf(activeSceneTab) < 0) {
                return tabs[0].name;
            }

            var changedNames = [];
            for (var k = 0; k < present.length; k++) {
                var pn = present[k];
                var sig = getCharActivitySig(stat, pn);
                if (__mnxSceneTabInitialized && __mnxLastCharActivity[pn] !== undefined && __mnxLastCharActivity[pn] !== sig) {
                    changedNames.push(pn);
                }
                __mnxLastCharActivity[pn] = sig;
            }

            if (__mnxSceneTabInitialized && changedNames.length && activeValid) {
                var activeChanged = changedNames.indexOf(activeSceneTab) >= 0;
                if (!activeChanged) {
                    var changedSorted = sortCharNames(changedNames);
                    return changedSorted[changedSorted.length - 1];
                }
            }

            if (!activeValid) return tabs[0].name;
            return activeSceneTab;
        }

        function runSceneClipAnimation(clipEl, opening) {
            var dur = getSceneCollapseDuration();
            var easing = 'cubic-bezier(0.32, 0.72, 0, 1)';
            if (opening) {
                return clipEl.animate([
                    { '--clip-bottom': '100%', '--clip-opacity': 0 },
                    { '--clip-bottom': '0%', '--clip-opacity': 1 }
                ], { duration: dur, easing: easing, fill: 'forwards' });
            }
            return clipEl.animate([
                { '--clip-bottom': '0%', '--clip-opacity': 1 },
                { '--clip-bottom': '100%', '--clip-opacity': 0 }
            ], { duration: dur, easing: easing, fill: 'forwards' });

        function applySceneCollapsedState(animate) {
            var $shell = $('#scene-shell');
            var $clip = ensureSceneStageClip();
            var clipEl = $clip.get(0);
            if (!$shell.length || !clipEl) return;

            var opening = !!sceneCardsOpen;
            var item = getCurrentSceneItem();

            cancelSceneCollapseAnim();
            $('#scene-stage').removeClass('scene-stage-is-hidden');

            if (!animate || getSceneCollapseDuration() <= 1) {
                $shell.toggleClass('scene-collapsed', !opening);
                $shell.removeClass('scene-transitioning scene-collapse-waapi');
                clearSceneClipVars(clipEl);
                if (item) renderSceneCollapseBar(item);
                return;
            }

            if (!shouldUseWaapiCollapse()) {
                $shell.addClass('scene-transitioning');
                if (item) renderSceneCollapseBar(item);
                $shell.toggleClass('scene-collapsed', !opening);
                clearSceneClipVars(clipEl);
                applySceneCollapsedState._timer = window.setTimeout(function() {
                    finishSceneCollapseTransition($shell);
                }, getSceneCollapseDuration() + 60);
                return;
            }

            $shell.addClass('scene-transitioning scene-collapse-waapi');
            if (item) renderSceneCollapseBar(item);

            if (opening) {
                $shell.removeClass('scene-collapsed');
                setSceneClipVars(clipEl, '100%', 0);
                void clipEl.offsetHeight;
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        var anim = runSceneClipAnimation(clipEl, true);
                        applySceneCollapsedState._anim = anim;
                        anim.onfinish = function() {
                            finishSceneCollapseTransition($shell);
                            clearSceneClipVars(clipEl);
                        };
                        anim.oncancel = function() {
                            finishSceneCollapseTransition($shell);
                            clearSceneClipVars(clipEl);
                        };
                        applySceneCollapsedState._timer = window.setTimeout(function() {
                            finishSceneCollapseTransition($shell);
                            clearSceneClipVars(clipEl);
                        }, getSceneCollapseDuration() + 80);
                    });
                });
                return;
            }

            $shell.addClass('scene-collapsed');
            clearSceneClipVars(clipEl);
            setSceneClipVars(clipEl, '0%', 1);
            void clipEl.offsetHeight;
            requestAnimationFrame(function() {
                requestAnimationFrame(function() {
                    var collapseAnim = runSceneClipAnimation(clipEl, false);
                applySceneCollapsedState._anim = collapseAnim;
                collapseAnim.onfinish = function() {
                    finishSceneCollapseTransition($shell);
                    clearSceneClipVars(clipEl);
                };
                collapseAnim.oncancel = function() {
                    finishSceneCollapseTransition($shell);
                    clearSceneClipVars(clipEl);
                };
                applySceneCollapsedState._timer = window.setTimeout(function() {
                    finishSceneCollapseTransition($shell);
                    clearSceneClipVars(clipEl);
                }, getSceneCollapseDuration() + 80);
                });
            });
        }

                } catch(e) {}
            }
            try { add(window.top && window.top.document); } catch(e) {}
            try { add(window.parent && window.parent.document); } catch(e) {}
            add(document);
            return docs;

        function playUnlockQueue() {
            if (unlockPlaying || !unlockQueue.length) return;
            unlockPlaying = true;
            unlockCeremonySeq += 1;
            var ceremonyToken = unlockCeremonySeq;
            var $ceremony = null;
            try {
                removeGalleryCeremonies();
                var item = unlockQueue.shift();
                var ceremonyDoc = getGalleryCeremonyDocument();
                ensureTopGalleryCeremonyStyle(ceremonyDoc);
                $ceremony = $(ceremonyDoc.createElement('div')).addClass('gallery-ceremony').css({ '--ceremony-accent': item.color, position: 'fixed', left: '0', top: '0', width: '100vw', height: '100dvh', display: 'flex', alignItems: 'center', justifyContent: 'center' });
                syncGalleryViewport($ceremony);
                var $pack = $(ceremonyDoc.createElement('div')).addClass('gallery-pack');
                var showCount = Math.min(item.count || 1, 5);
                for (var ci = 0; ci < showCount; ci++) {
                    var $card = $(ceremonyDoc.createElement('div')).addClass('gallery-card gallery-card-' + ci).css('--card-i', ci);
                    $(ceremonyDoc.createElement('div')).addClass('gallery-card-back').html('<i class="fa-solid fa-scroll"></i>').appendTo($card);
                    $(ceremonyDoc.createElement('div')).addClass('gallery-card-shine').appendTo($card);
                    $pack.append($card);
                }
                if ((item.count || 0) > showCount) $(ceremonyDoc.createElement('div')).addClass('gallery-more').text('+' + ((item.count || 0) - showCount)).appendTo($pack);
                $(ceremonyDoc.createElement('div')).addClass('gallery-title').text(item.name + ' · 新立绘 x' + item.count).appendTo($ceremony);
                $(ceremonyDoc.createElement('div')).addClass('gallery-sub').text('好感抵达 ' + item.mark + '，可前往立绘管理查看').appendTo($ceremony);
                var $go = $(ceremonyDoc.createElement('button')).attr('type','button').addClass('gallery-go').text('前往立绘管理');
                function finishCeremony(openGallery) {
                    if (ceremonyToken !== unlockCeremonySeq) return;
                    if (openGallery) openGalleryForRole(item.name);
                    if ($ceremony) $ceremony.remove();
                    unlockPlaying = false;
                    playUnlockQueue();
                }
                function openGalleryForRole(roleName){
                    var idx = GALLERY_ROLE_ORDER.indexOf(roleName);
                    if (idx >= 0) managerIndex = idx;
                    if ($('#scene-shell').hasClass('scene-collapsed')) {
                        sceneCardsOpen = true;
                        renderSceneStage();

                    setShown('opt-m', false);
                    setShown('st-m', true);
                    renderManager();
                    setTimeout(function(){ $('#st-box .st-scroll').scrollTop(0); }, 30);

                $go.on('click', function(e){
                    e.stopPropagation();
                    finishCeremony(true);
                });
                $ceremony.on('click', '.gallery-pack, .gallery-title', function(){
                    finishCeremony(true);
                });
                $ceremony.prepend($pack).append($go);
                ceremonyDoc.body.appendChild($ceremony.get(0));
                syncGalleryViewport($ceremony);
                setTimeout(function(){
                    if (ceremonyToken !== unlockCeremonySeq || !$ceremony) return;
                    syncGalleryViewport($ceremony);
                    $ceremony.addClass('show');
                }, 30);
                setTimeout(function() {
                    if (ceremonyToken !== unlockCeremonySeq || !$ceremony) return;
                    $ceremony.removeClass('show');
                    setTimeout(function(){ finishCeremony(false); }, 360);
                }, 3300);
            } catch(e) {
                try { if ($ceremony) $ceremony.remove(); } catch(e2) {}
                unlockPlaying = false;
                setTimeout(playUnlockQueue, 0);
            }
        }

                    var $btn = $('<button>').attr('type', 'button').addClass('st-tab')
                        .css('--tab-accent', tabColor)
                        .attr('data-idx', i).text(tabName);
                    if (pendingUnlock[tabName] || getPendingUnlocksForRole(tabName).length) $('<span>').addClass('st-tab-new').text('NEW').appendTo($btn);
                    if(i === managerIndex) $btn.addClass('on');
                    $tabs.append($btn);
                }
            }

            $('#st-color-picker').val(currentColor);

            var list = getImgList(name);
            var cur = getSelectedPortrait(name);
            var $grid = $('#st-grid');
            if(!$grid.length) return;
            $grid.empty();
            var favInfo = getFavorInfo(name);
            var favorCap = CORE_GALLERY_ROLES[name] ? 100 : 40;
            var nextText = favInfo.nextPortrait ? ('下次解锁 ' + favInfo.nextPortrait + ' 好感') : '立绘已全部解锁';
            var heroPct = favorCap ? Math.round((favorCap ? clamp(favInfo.favor, 0, favorCap) : 0) / favorCap * 100) : 0;
            $('#st-stat-text').html((isRandomPortraitMode(name) ? '<span class="st-random-note"><i class="fa-solid fa-shuffle"></i>随机展示中</span> ' : '') + nextText);
            $('#st-hero-role').text(name);
            $('#st-hero-badge').text(CORE_GALLERY_ROLES[name] ? '核心立绘' : '角色图鉴');
            $('#st-hero-num').text(favInfo.favor + ' / ' + favorCap);
            $('#st-hero-next').text(nextText);
            $('#st-favor-hero').css('--hero-accent', currentColor);
            $('#st-hero-fill').css('width', heroPct + '%');
            $('#st-reset').toggleClass('random-on', isRandomPortraitMode(name)).find('span').text(isRandomPortraitMode(name) ? '随机展示中' : '随机展示');

            if(!list.length) {
                $('<div>').addClass('manage-empty').text('该角色暂未配置网图链接。').appendTo($grid);
                return;
            }

            var pendingFiles = {};
            getPendingUnlocksForRole(name).forEach(function(item){ (item.files || []).forEach(function(file){ pendingFiles[file] = true; }); });

            for(var j=0; j<list.length; j++) {
                var item = list[j];
                var u = item.u;
                var need = getImageNeedForItem(name, item, j);
                var isUnl = isImageUnlocked(name, u, j);
                var $imgC = $('<button>').attr('type', 'button').addClass('st-img-c')
                    .css('--tile-accent', currentColor).attr('data-u', u).attr('data-file', item.file).attr('title', isUnl ? '已解锁' : '好感达到' + need + '解锁')
                    .attr('aria-pressed', cur === u ? 'true' : 'false');
                if(cur === u) $imgC.addClass('sel');
                if(!isUnl) $imgC.addClass('locked');
                if(pendingFiles[item.file]) $imgC.addClass('new');

                if(isUnl) {
                    bindImageLoading($('<img>').addClass('st-img').attr({ src: u, loading: 'lazy', decoding: 'async', referrerpolicy: 'no-referrer' }).appendTo($imgC), $imgC);
                } else {
                    var $back = $('<div>').addClass('st-img-back');
                    $('<i>').addClass('fa-solid fa-lock').appendTo($back);
                    $('<span>').text('未解锁').appendTo($back);
                    $back.appendTo($imgC);
                }
                if(!isUnl) {
                    $('<span>').addClass('st-lock').html('<i class="fa-solid fa-lock" style="margin-right:4px"></i>' + need).appendTo($imgC);
                } else if (pendingFiles[item.file]) {
                    $('<span>').addClass('st-new').text('NEW').appendTo($imgC);
                }
                $grid.append($imgC);
            }
            markRoleUnlocksSeen(name);
            updateGalleryHint();
            setTimeout(updateGalleryTabNavState, 30);
        }

        async function init() {
            if (!window.__DWF_PREVIEW_BOOT__) {
                await waitGlobalInitialized('Mvu');
            }
            uiPrefs = Object.assign(uiPrefs, readObj(PREF_KEY, {}));
            uiPrefs.sceneDefaultOpen = uiPrefs.sceneDefaultOpen !== false;
            sceneCardsOpen = uiPrefs.sceneDefaultOpen;
            manualSel = readObj(MANUAL_SEL_KEY, {});
            autoSel = readObj(AUTO_SEL_KEY, {});
            imgUnlock = readObj(IMG_UNLOCK_KEY, {});
            customColors = readObj(CUSTOM_COLOR_KEY, {}); // 读取自定义颜色
            unlocked = localStorage.getItem(UNLOCK_KEY) === 'true';
            unlockStages = readObj(UNLOCK_STAGE_KEY, {});

            await initGalleryStore();
            applyUiPrefs();

            ensureLiveStatusBar();

            if (typeof document !== 'undefined' && document.addEventListener) {
                document.addEventListener('visibilitychange', function(){
                    if (!document.hidden) {
                        invalidateEnsureLiveStatusBarCache();
                        if (ensureLiveStatusBar()) scheduleRefreshScene(false);
                    }
                });
            }

            populateCharacterData(true);
            if (window.DwfMvu && DwfMvu.initDwfMainNav) DwfMvu.initDwfMainNav();
            if (window.__DWF_PREVIEW_BOOT__ && window.DwfMvu && DwfMvu.switchMainPanel) {
                var previewTab = 'fengxin';
                try {
                    previewTab = sessionStorage.getItem('__dwf_preview_tab__') || previewTab;
                } catch (e) {}
                DwfMvu.switchMainPanel(previewTab, getStatData());
            }
            lzStatusLog('ready', { sceneTabs: sceneTabs.length });

            if (!window.__DWF_PREVIEW_BOOT__ && typeof eventOn === 'function' && window.Mvu && Mvu.events) {
            var mvuUpdateStop = eventOn(Mvu.events.VARIABLE_UPDATE_ENDED, function() {
                invalidateEnsureLiveStatusBarCache();
                scheduleRefreshScene(true);
            });
            if (mvuUpdateStop) __mnxEventStops.push(mvuUpdateStop);
            }
            var _eventOn = typeof eventOn === 'function' ? eventOn : (window.parent && typeof window.parent.eventOn === 'function' ? window.parent.eventOn.bind(window.parent) : null);
            var _events = window.tavern_events || (window.parent && window.parent.tavern_events) || {};
            ['MESSAGE_RECEIVED','MESSAGE_UPDATED','MESSAGE_SWIPED','CHARACTER_MESSAGE_RENDERED','MESSAGE_DELETED','CHAT_CHANGED'].forEach(function(key) {
                if (_eventOn && _events && _events[key]) {
                    try {
                        var eventStop = _eventOn(_events[key], function(){
                            invalidateEnsureLiveStatusBarCache();
                            if (ensureLiveStatusBar()) scheduleRefreshScene(key === 'MESSAGE_RECEIVED' || key === 'MESSAGE_UPDATED');
                        });
                        if (eventStop) __mnxEventStops.push(eventStop);
                    } catch(e) {}
                }
            });
            if (!_eventOn && !__mnxPollTimer) {
                __mnxPollTimer = setInterval(function(){
                    if (document.hidden) return;
                    ensureLiveStatusBarCached();
                    if (__mnxIsLiveBar) scheduleRefreshScene(false);
                }, STATUS_POLL_INTERVAL);
            }

            function openGalleryManager() {
                if ($('#scene-shell').hasClass('scene-collapsed')) {
                    sceneCardsOpen = true;
                    renderSceneStage();
                }
                setShown('st-m', true);
                setShown('opt-m', false);
                renderManager();
                setTimeout(function(){ $('#st-box .st-scroll').scrollTop(0); }, 30);
            }

            $('#mt').on('click', function() { setShown('opt-m', !isShown('opt-m')); });
            $('#lk').on('click', openGalleryManager);
            $(document).on('click', '#gallery-hint', openGalleryManager);
            $('#st-close').on('click', function() {
                releaseGalleryImages($('#st-grid'), true);
                setShown('st-m', false);
            });
            $('#theme-trigger').on('click', function() { $('#theme-list').toggleClass('show'); });

            $('#theme-list').on('click', '.theme-item', function() {
                uiPrefs.theme = $(this).attr('data-theme-key');
                saveUiPrefs();
                applyUiPrefs();
                $('#theme-list').removeClass('show');
            });

            function bindRng(id, k) {
                $('#' + id).on('input', function() {
                    uiPrefs[k] = Number($(this).val());
                    saveUiPrefs();
                    applyUiPrefs();
                    scheduleRefreshScene(true);
                });
            }
            bindRng('support-visible-range', 'supportVisibleLimit');

            $('#scene-default-open').on('change', function() {
                uiPrefs.sceneDefaultOpen = this.checked;
                sceneCardsOpen = this.checked;
                sceneExpandMemory = {};
                saveUiPrefs();
                renderSceneStage();
            });

            $('#st-tabs').on('click', '.st-tab', function() {
                managerIndex = Number($(this).attr('data-idx'));
                renderManager();
            });

            $(document).on('click', '#st-tab-prev', function() { stepGalleryTab(-1); });
            $(document).on('click', '#st-tab-next', function() { stepGalleryTab(1); });
            $(document).on('scroll', '#st-tabs', updateGalleryTabNavState);

            $('#st-grid').on('click', '.st-img-c', function() {
                var $btn = $(this);
                if($btn.hasClass('locked')) return;
                var name = GALLERY_ROLE_ORDER[managerIndex];
                var url = $btn.attr('data-u');
                var alreadySelected = $btn.hasClass('sel') && getSelectedPortrait(name) === url;
                if (alreadySelected) {
                    openTopImagePreview(url);
                    return;
                }
                setSelectedPortrait(name, url);
                if (activeSceneTab === name) sceneExpandMemory[name] = sceneCardsOpen;
                refreshScene(true, { skipManager: true });
                $('#st-grid .st-img-c').removeClass('sel').attr('aria-pressed', 'false');
                $btn.addClass('sel').attr('aria-pressed', 'true');
            });

            $('#st-reset').on('click', function() {
                var name = GALLERY_ROLE_ORDER[managerIndex];
                var wasRandom = isRandomPortraitMode(name);
                var picked = '';
                if (wasRandom) {
                    clearSelectedPortrait(name);
                } else {
                    picked = randomizeSelectedPortrait(name);
                }
                refreshScene(true, { skipManager: true });
                renderManager();
                var $btn = $('#st-reset span');
                var oldText = $btn.text();
                $btn.text(wasRandom ? '已取消随机' : (picked ? '已随机切换' : '暂无可随机立绘'));
                setTimeout(function(){ $btn.text(isRandomPortraitMode(name) ? '随机展示中' : '随机展示'); }, 1200);
            });

            $('#st-test-draw').on('click', function() {
                var name = GALLERY_ROLE_ORDER[managerIndex] || GALLERY_ROLE_ORDER[0] || '银心';
                var favInfo = getFavorInfo(name);
                var count = Math.max(1, Math.min(5, (getUnlockedImgList(name) || []).length || 3));
                unlockQueue.push({ name: name, mark: favInfo.favor || 0, count: count, files: [], color: getCharColor(name) });
                playUnlockQueue();
            });

            // 新增：颜色选择器改变事件
            $('#st-color-picker').on('change', function() {
                var name = GALLERY_ROLE_ORDER[managerIndex] || CHAR_ORDER[0];
                customColors[name] = $(this).val();
                writeObj(CUSTOM_COLOR_KEY, customColors);
                $('#st-grid .st-img-c').css('--tile-accent', customColors[name]);
                $('#st-favor-hero').css('--hero-accent', customColors[name]);
                refreshScene(true);
            });

            // 新增：重置颜色按钮事件
            $('#st-color-reset').on('click', function() {
                var name = GALLERY_ROLE_ORDER[managerIndex] || CHAR_ORDER[0];
                delete customColors[name];
                writeObj(CUSTOM_COLOR_KEY, customColors);
                var restoredColor = getCharColor(name);
                $('#st-color-picker').val(restoredColor);
                $('#st-grid .st-img-c').css('--tile-accent', restoredColor);
                $('#st-favor-hero').css('--hero-accent', restoredColor);
                refreshScene(true);
            });

            $('#st-unlock-all').on('click', function() { setShown('pwd-m', true); $('#pi').val(''); });
            $('#pwd-cancel').on('click', function() { setShown('pwd-m', false); });
            $('#pwd-confirm').on('click', function() {
                if($('#pi').val() === ACCESS_PASSWORD) {
                    unlocked = true;
                    localStorage.setItem(UNLOCK_KEY, 'true');
                    setShown('pwd-m', false);
                    renderManager();
                } else {
                    $('#pwd-err').text('密码错误');
                }
            });

            $('#scene-tabs').on('click', '.scene-tab', function() {
                var name = $(this).attr('data-name') || '';
                if (!name) return;
                var switching = name !== activeSceneTab;
                activeSceneTab = name;
                lzStatusLog('tab change', name);
                if (switching && typeof sceneExpandMemory[name] === 'boolean') {
                    sceneCardsOpen = sceneExpandMemory[name];
                } else if (switching) {
                    sceneCardsOpen = uiPrefs.sceneDefaultOpen !== false;
                    sceneExpandMemory[name] = sceneCardsOpen;
                } else if (!sceneCardsOpen) {
                    sceneCardsOpen = true;
                    sceneExpandMemory[name] = true;
                }
                if (pendingUnlock[name]) {
                    delete pendingUnlock[name];
                }
                renderSceneTabs();
                renderSceneStage();
            });

            $('#scene-tab-prev').on('click', function() {
                activateSceneTabByStep(-1);
            });

            $('#scene-tab-next').on('click', function() {
                activateSceneTabByStep(1);
            });

            (function(){
                var tabs = document.getElementById('scene-tabs');
                if (tabs) tabs.addEventListener('scroll', updateSceneTabNavState, { passive: true });
            })();

            $('#scene-tabs').on('touchstart', function(e) {
                var touch = e.originalEvent && e.originalEvent.changedTouches && e.originalEvent.changedTouches[0];
                if (!touch) return;
                sceneTouch.x = touch.clientX;
                sceneTouch.y = touch.clientY;
                sceneTouch.dx = 0;
                sceneTouch.dy = 0;
            });

            $('#scene-tabs').on('touchmove', function(e) {
                var touch = e.originalEvent && e.originalEvent.changedTouches && e.originalEvent.changedTouches[0];
                if (!touch) return;
                sceneTouch.dx = touch.clientX - sceneTouch.x;
                sceneTouch.dy = touch.clientY - sceneTouch.y;
            });

            $('#scene-tabs').on('touchend', function() {
                if (Math.abs(sceneTouch.dx) > 44 && Math.abs(sceneTouch.dx) > Math.abs(sceneTouch.dy)) {
                    activateSceneTabByStep(sceneTouch.dx < 0 ? 1 : -1);
                } else {
                    updateSceneTabNavState();
                }
            });

            $('#scene-collapse-bar').on('click', '.scene-collapse-toggle', function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (typeof window.__mnxClearAllThoughtPins === 'function') window.__mnxClearAllThoughtPins();
                sceneCardsOpen = !sceneCardsOpen;
                if (activeSceneTab) sceneExpandMemory[activeSceneTab] = sceneCardsOpen;
                applySceneCollapsedState(true);
            });

            (function initThoughtTouch() {
                var SUPPRESS_MS = 520;
                var AUTO_HIDE_MS = 4500;
                var hold = { timer: null, startX: 0, startY: 0, moved: false, fired: false, $wrap: null };
                var HOLD_MS = 460;
                var MOVE_CANCEL_PX = 14;

                function isCoarseTouch() {
                    return window.matchMedia && window.matchMedia('(hover:none), (pointer:coarse)').matches;
                }
                function thoughtPortrait($wrap) {
                    return $wrap.find('.lz-char-portrait, .av-portrait-shell').first();
                }
                function hasThought($wrap) {
                    return thoughtPortrait($wrap).find('.av-thought-bubble').length > 0;
                }
                function isThoughtVisible($wrap) {
                    var $portrait = thoughtPortrait($wrap);
                    return $portrait.hasClass('show-thought') || $portrait.hasClass('thought-pinned');
                }
                function clearThought($wrap) {
                    if (!$wrap || !$wrap.length) return;
                    var $portrait = thoughtPortrait($wrap);
                    $portrait.removeClass('show-thought thought-pinned thought-holding');
                    var node = $portrait.get(0);
                    if (node && typeof node.blur === 'function') node.blur();
                    var autoHide = $wrap.data('thought-auto-hide');
                    if (autoHide) clearTimeout(autoHide);
                    $wrap.removeData('lp-active thought-pinned suppress-click tap-dismiss thought-auto-hide');
                }
                function clearAllThoughts() {
                    $('#scene-stage .lz-char-flip-container, #scene-stage .av-flip-wrap').each(function() {
                        var $w = $(this);
                        if ($w.data('thought-pinned') || $w.data('thought-auto-hide') || isThoughtVisible($w)) {
                            clearThought($w);
                        }
                    });
                    resetHold();
                }
                function resetHold() {
                    clearTimeout(hold.timer);
                    hold.timer = null;
                    hold.moved = false;
                    hold.fired = false;
                    hold.$wrap = null;
                }
                function revealThought($wrap) {
                    var $portrait = thoughtPortrait($wrap);
                    $portrait.addClass('show-thought thought-holding');
                    $wrap.data('lp-active', true);
                    hold.fired = true;
                    if (navigator.vibrate) {
                        try { navigator.vibrate(10); } catch (err) {}
                    }
                }
                function pinThought($wrap) {
                    var $portrait = thoughtPortrait($wrap);
                    $portrait.removeClass('thought-holding').addClass('show-thought');
                    $wrap.removeData('lp-active');

                    if (isCoarseTouch()) {
                        var prev = $wrap.data('thought-auto-hide');
                        if (prev) clearTimeout(prev);
                        $wrap.data('thought-auto-hide', setTimeout(function() {
                            clearThought($wrap);
                        }, AUTO_HIDE_MS));
                        return;
                    }

                    $portrait.addClass('thought-pinned');
                    $wrap.data('thought-pinned', true);
                    $wrap.data('suppress-click', true);
                    setTimeout(function() {
                        $wrap.removeData('suppress-click');
                    }, SUPPRESS_MS);
                }

                window.__mnxClearThoughtPin = clearThought;
                window.__mnxClearAllThoughtPins = clearAllThoughts;

                $('#scene-stage')
                    .on('touchstart.mnxThought', '.lz-char-flip-container, .av-flip-wrap', function(e) {
                        var touch = e.originalEvent && e.originalEvent.touches && e.originalEvent.touches[0];
                        if (!touch) return;
                        var $wrap = $(this);
                        if (!hasThought($wrap)) return;

                        if (isThoughtVisible($wrap) && !hold.timer) {
                            $wrap.data('tap-dismiss', true);
                            return;
                        }

                        clearAllThoughts();
                        resetHold();
                        hold.$wrap = $wrap;
                        hold.startX = touch.clientX;
                        hold.startY = touch.clientY;
                        hold.timer = setTimeout(function() {
                            if (hold.moved || hold.$wrap !== $wrap) return;
                            revealThought($wrap);
                        }, HOLD_MS);
                    })
                    .on('touchmove.mnxThought', '.lz-char-flip-container, .av-flip-wrap', function(e) {
                        if (!hold.timer && !hold.fired) return;
                        var touch = e.originalEvent && e.originalEvent.touches && e.originalEvent.touches[0];
                        if (!touch) return;
                        if (Math.abs(touch.clientX - hold.startX) > MOVE_CANCEL_PX || Math.abs(touch.clientY - hold.startY) > MOVE_CANCEL_PX) {
                            hold.moved = true;
                            clearTimeout(hold.timer);
                            hold.timer = null;
                            if (hold.fired && hold.$wrap) {
                                clearThought(hold.$wrap);
                                hold.fired = false;
                            }
                        }
                    })
                    .on('touchend.mnxThought touchcancel.mnxThought', '.lz-char-flip-container, .av-flip-wrap', function() {
                        var $wrap = $(this);
                        clearTimeout(hold.timer);
                        hold.timer = null;

                        if ($wrap.data('tap-dismiss')) {
                            $wrap.removeData('tap-dismiss');
                            clearThought($wrap);
                            $wrap.data('suppress-click', true);
                            setTimeout(function() { $wrap.removeData('suppress-click'); }, SUPPRESS_MS);
                            resetHold();
                            return;
                        }

                        if (hold.fired && hold.$wrap === $wrap) {
                            pinThought($wrap);
                            resetHold();
                            return;
                        }

                        if (hold.$wrap === $wrap) {
                            clearThought($wrap);
                        }
                        resetHold();
                    });

                $(document).on('touchstart.mnxThoughtOutside', function(e) {
                    if ($(e.target).closest('.lz-char-flip-container, .av-flip-wrap').length) return;
                    clearAllThoughts();
                });

                __mnxThoughtTeardown = function() {
                    $('#scene-stage').off('.mnxThought');
                    $(document).off('.mnxThoughtOutside');
                    clearAllThoughts();
                    delete window.__mnxClearThoughtPin;
                    delete window.__mnxClearAllThoughtPins;
                };
            })();

            $('#pv').on('click', function(e) { if (e.target === this) setShown('pv', false); });
            $('#pvb').on('click', function() { setShown('pv', false); });
            $('#st-m, #pwd-m').on('click', function(e) { if (e.target === this) setShown(this.id, false); });
            $(document).on('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeTopImagePreview();
                    setShown('pv', false);
                    setShown('st-m', false);
                    setShown('pwd-m', false);
                }
            });
            $(window).on('resize', scheduleSyncPreviewViewport);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', scheduleSyncPreviewViewport);
                window.visualViewport.addEventListener('scroll', scheduleSyncPreviewViewport);
            }

            function saveUiPrefs() { writeObj(PREF_KEY, uiPrefs); }
        }

        $(errorCatched(init));
    </script>
